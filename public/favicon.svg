<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bridgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 桥墩 -->
  <rect x="15" y="40" width="10" height="40" rx="2" fill="url(#bridgeGradient)" />
  <rect x="75" y="40" width="10" height="40" rx="2" fill="url(#bridgeGradient)" />
  
  <!-- 桥面 -->
  <rect x="10" y="35" width="80" height="8" rx="4" fill="url(#bridgeGradient)" />
  
  <!-- 桥拱 -->
  <path d="M 25 40 Q 50 60 75 40" stroke="url(#bridgeGradient)" stroke-width="4" fill="none" />
  
  <!-- 光芒 -->
  <circle cx="50" cy="25" r="15" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6">
    <animate attributeName="r" from="10" to="20" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.8" to="0" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
